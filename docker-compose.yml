version: '3.8'

services:
  # ===== 基础设施 =====
  mysql:
    image: mysql:8.0
    command: --max_connections=500
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: blog
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  elasticsearch:
    build:
      context: ./backend
      dockerfile: elasticsearch/Dockerfile
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===== 微服务 =====
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=your-jwt-secret
    depends_on:
      - user-service
      - content-service
      - interaction-service
      - search-service
      - audit-service

  user-service:
    build:
      context: ./backend
      dockerfile: services/user-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=blog
      - JWT_SECRET=your-jwt-secret
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy

  content-service:
    build:
      context: ./backend
      dockerfile: services/content-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=blog
      - REDIS_ADDR=redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  interaction-service:
    build:
      context: ./backend
      dockerfile: services/interaction-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=blog
      - REDIS_ADDR=redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  notification-service:
    build:
      context: ./backend
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=blog
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  search-service:
    build:
      context: ./backend
      dockerfile: services/search-service/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - ES_URL=http://elasticsearch:9200
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  audit-service:
    build:
      context: ./backend
      dockerfile: services/audit-service/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=blog
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
  es_data:
