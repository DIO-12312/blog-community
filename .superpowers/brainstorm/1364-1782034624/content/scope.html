<h2>个人中心应该包含哪些内容？</h2>
<p class="subtitle">除了按状态展示自己的文章外，还需要什么？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>仅文章管理</h3>
      <p>只展示用户自己的文章，三个标签页：草稿 / 待审核 / 已发布，每页显示文章卡片列表</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>文章 + 用户信息卡片</h3>
      <p>顶部展示用户基本信息（头像占位、用户名、邮箱、注册时间），下方是文章标签页。结构清晰但不臃肿</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>完整个人主页</h3>
      <p>用户信息 + 文章管理 + 收藏列表 + 关注/粉丝数 + 个人资料编辑入口。功能全面</p>
    </div>
  </div>
</div>
